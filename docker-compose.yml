# =====================================================================
# Shared environment block for Hadoop runtime templating.
# 用于 Hadoop 配置模板渲染的共享环境变量块。
# =====================================================================
x-hadoop-common-environment: &hadoop-common-environment
  HADOOP_VERSION: ${HADOOP_VERSION}
  HADOOP_CONF_TEMPLATE_DIR: ${HADOOP_CONF_TEMPLATE_DIR}
  SSH_SHARED_DIR: ${SSH_SHARED_DIR:-/shared-ssh}
  NAMENODE_HOST: ${NAMENODE_HOST}
  NAMENODE_RPC_PORT: ${NAMENODE_RPC_PORT}
  NAMENODE_HTTP_PORT: ${NAMENODE_HTTP_PORT}
  RESOURCEMANAGER_HOST: ${RESOURCEMANAGER_HOST}
  RESOURCEMANAGER_WEB_PORT: ${RESOURCEMANAGER_WEB_PORT}
  SECONDARY_NAMENODE_HOST: ${SECONDARY_NAMENODE_HOST}
  SECONDARY_NAMENODE_HTTP_PORT: ${SECONDARY_NAMENODE_HTTP_PORT}
  JOBHISTORY_HOST: ${JOBHISTORY_HOST}
  JOBHISTORY_RPC_PORT: ${JOBHISTORY_RPC_PORT}
  JOBHISTORY_WEB_PORT: ${JOBHISTORY_WEB_PORT}
  DFS_REPLICATION: ${DFS_REPLICATION}
  HADOOP_TMP_DIR: ${HADOOP_TMP_DIR}
  HDFS_NAMENODE_NAME_DIR: ${HDFS_NAMENODE_NAME_DIR}
  HDFS_DATANODE_DATA_DIR: ${HDFS_DATANODE_DATA_DIR}
  YARN_NODEMANAGER_LOCAL_DIR: ${YARN_NODEMANAGER_LOCAL_DIR}
  YARN_NODEMANAGER_LOG_DIR: ${YARN_NODEMANAGER_LOG_DIR}
  MAPRED_HISTORY_TMP_DIR: ${MAPRED_HISTORY_TMP_DIR}
  MAPRED_HISTORY_DONE_DIR: ${MAPRED_HISTORY_DONE_DIR}
  WAIT_FOR_NAMENODE_RETRIES: ${WAIT_FOR_NAMENODE_RETRIES}
  WAIT_FOR_NAMENODE_INTERVAL: ${WAIT_FOR_NAMENODE_INTERVAL}
  HADOOP_PROXYUSER_ROOT_HOSTS: ${HADOOP_PROXYUSER_ROOT_HOSTS:-hadoop1,hadoop2,hadoop3,localhost}
  HADOOP_PROXYUSER_ROOT_GROUPS: ${HADOOP_PROXYUSER_ROOT_GROUPS:-root}
  HADOOP_DAEMON_USER: ${HADOOP_DAEMON_USER:-hadoop}
  ENABLE_SSH_USER_ENV: ${ENABLE_SSH_USER_ENV:-false}
  AUTO_RESET_DATANODE_DATA_ON_VERSION_CHANGE: ${AUTO_RESET_DATANODE_DATA_ON_VERSION_CHANGE:-true}
  HADOOP_HEAPSIZE_MAX: ${HADOOP_HEAPSIZE_MAX:-}
  HADOOP_NAMENODE_OPTS: ${HADOOP_NAMENODE_OPTS:-}
  HADOOP_DATANODE_OPTS: ${HADOOP_DATANODE_OPTS:-}
  HADOOP_SECONDARYNAMENODE_OPTS: ${HADOOP_SECONDARYNAMENODE_OPTS:-}
  YARN_RESOURCEMANAGER_OPTS: ${YARN_RESOURCEMANAGER_OPTS:-}
  YARN_NODEMANAGER_OPTS: ${YARN_NODEMANAGER_OPTS:-}
  MAPRED_HISTORYSERVER_OPTS: ${MAPRED_HISTORYSERVER_OPTS:-}

# =====================================================================
# Shared least-privilege security block.
# 共享的最小权限安全设置。
# =====================================================================
x-hadoop-common-security: &hadoop-common-security
  init: true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  hadoop1:
    # Build shared base image once; other nodes reuse the same image tag.
    # 仅构建一次共享镜像；其余节点复用同一镜像标签。
    build:
      context: .
      args:
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_BASE_URL: ${HADOOP_BASE_URL:-https://dlcdn.apache.org/apache/hadoop/common}
        HADOOP_TARBALL_SHA512: ${HADOOP_TARBALL_SHA512}
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: hadoop1
    hostname: hadoop1
    environment:
      <<: *hadoop-common-environment
      NODE_ROLE: namenode
      AUTO_FORMAT: ${AUTO_FORMAT_NAMENODE}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${NAMENODE_HTTP_PORT}:${NAMENODE_HTTP_PORT}"
      - "${HOST_BIND_IP:-127.0.0.1}:${NAMENODE_RPC_PORT}:${NAMENODE_RPC_PORT}"
    volumes:
      # Mount all config templates once; entrypoint renders them to runtime conf.
      # 一次性挂载模板配置目录；entrypoint 会渲染到运行配置目录。
      - ./conf:${HADOOP_CONF_TEMPLATE_DIR}:ro
      - ssh_keys:${SSH_SHARED_DIR:-/shared-ssh}
      - hadoop1_name:${HDFS_NAMENODE_NAME_DIR}
      - hadoop1_data:${HDFS_DATANODE_DATA_DIR}
      - hadoop1_tmp:${HADOOP_TMP_DIR}
    healthcheck:
      # NameNode is healthy when web endpoint responds and safemode is OFF.
      # 当 NameNode Web 端点可用且已退出安全模式时判定健康。
      test: ["CMD-SHELL", "bash -lc 'pgrep -x sshd >/dev/null && curl -fsS http://127.0.0.1:${NAMENODE_HTTP_PORT}/ >/dev/null && hdfs dfsadmin -safemode get 2>/dev/null | grep -q \"Safe mode is OFF\"'"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}
    networks:
      - hadoop-net
    <<: *hadoop-common-security

  hadoop2:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: hadoop2
    hostname: hadoop2
    environment:
      <<: *hadoop-common-environment
      NODE_ROLE: resourcemanager
      AUTO_FORMAT: "false"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${RESOURCEMANAGER_WEB_PORT}:${RESOURCEMANAGER_WEB_PORT}"
    volumes:
      - ./conf:${HADOOP_CONF_TEMPLATE_DIR}:ro
      - ssh_keys:${SSH_SHARED_DIR:-/shared-ssh}
      - hadoop2_data:${HDFS_DATANODE_DATA_DIR}
      - hadoop2_yarn_local:${YARN_NODEMANAGER_LOCAL_DIR}
      - hadoop2_yarn_logs:${YARN_NODEMANAGER_LOG_DIR}
      - hadoop2_tmp:${HADOOP_TMP_DIR}
    healthcheck:
      # RM node is healthy when RM API responds and local worker daemons are up.
      # 当 RM API 可用且本地 NodeManager/DataNode 已启动时判定健康。
      test: ["CMD-SHELL", "bash -lc 'pgrep -x sshd >/dev/null && curl -fsS http://127.0.0.1:${RESOURCEMANAGER_WEB_PORT}/ws/v1/cluster/info >/dev/null && jps | grep -q NodeManager && jps | grep -q DataNode'"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}
    networks:
      - hadoop-net
    <<: *hadoop-common-security
    depends_on:
      # Startup gate: entrypoint performs fine-grained readiness checks.
      # 启动闸门：由 entrypoint 进行更细粒度可用性探测。
      hadoop1:
        condition: service_started

  hadoop3:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: hadoop3
    hostname: hadoop3
    environment:
      <<: *hadoop-common-environment
      NODE_ROLE: secondary
      AUTO_FORMAT: "false"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${SECONDARY_NAMENODE_HTTP_PORT}:${SECONDARY_NAMENODE_HTTP_PORT}"
      - "${HOST_BIND_IP:-127.0.0.1}:${JOBHISTORY_WEB_PORT}:${JOBHISTORY_WEB_PORT}"
    volumes:
      - ./conf:${HADOOP_CONF_TEMPLATE_DIR}:ro
      - ssh_keys:${SSH_SHARED_DIR:-/shared-ssh}
      - hadoop3_data:${HDFS_DATANODE_DATA_DIR}
      - hadoop3_tmp:${HADOOP_TMP_DIR}
      - hadoop3_history_tmp:${MAPRED_HISTORY_TMP_DIR}
      - hadoop3_history_done:${MAPRED_HISTORY_DONE_DIR}
    healthcheck:
      # Secondary node is healthy when JobHistory web endpoint responds.
      # 当 JobHistory Web 端点可用，且本地核心进程存活时判定健康。
      test: ["CMD-SHELL", "bash -lc 'pgrep -x sshd >/dev/null && curl -fsS http://127.0.0.1:${JOBHISTORY_WEB_PORT}/ >/dev/null && jps | grep -q SecondaryNameNode && jps | grep -q DataNode'"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}
    networks:
      - hadoop-net
    <<: *hadoop-common-security
    depends_on:
      hadoop1:
        condition: service_started
      hadoop2:
        condition: service_started

volumes:
  ssh_keys:
    name: ${SSH_KEYS_VOLUME_NAME:-hadoop_ssh_keys}
  hadoop1_name:
    name: ${HADOOP1_NAME_VOLUME_NAME:-hadoop1_name}
  hadoop1_data:
    name: ${HADOOP1_DATA_VOLUME_NAME:-hadoop1_data}
  hadoop1_tmp:
    name: ${HADOOP1_TMP_VOLUME_NAME:-hadoop1_tmp}
  hadoop2_data:
    name: ${HADOOP2_DATA_VOLUME_NAME:-hadoop2_data}
  hadoop2_yarn_local:
    name: ${HADOOP2_YARN_LOCAL_VOLUME_NAME:-hadoop2_yarn_local}
  hadoop2_yarn_logs:
    name: ${HADOOP2_YARN_LOGS_VOLUME_NAME:-hadoop2_yarn_logs}
  hadoop2_tmp:
    name: ${HADOOP2_TMP_VOLUME_NAME:-hadoop2_tmp}
  hadoop3_data:
    name: ${HADOOP3_DATA_VOLUME_NAME:-hadoop3_data}
  hadoop3_tmp:
    name: ${HADOOP3_TMP_VOLUME_NAME:-hadoop3_tmp}
  hadoop3_history_tmp:
    name: ${HADOOP3_HISTORY_TMP_VOLUME_NAME:-hadoop3_history_tmp}
  hadoop3_history_done:
    name: ${HADOOP3_HISTORY_DONE_VOLUME_NAME:-hadoop3_history_done}

networks:
  hadoop-net:
    # Bridge network allows container DNS by service/container hostname.
    # bridge 网络可通过服务名/主机名实现容器内 DNS 互通。
    driver: bridge
    name: ${HADOOP_NETWORK_NAME}