name: Publish Container to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Validate per-arch checksum variables
        env:
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
        run: |
          if [[ -z "${HADOOP_TARBALL_SHA512_AMD64}" || -z "${HADOOP_TARBALL_SHA512_ARM64}" ]]; then
            echo "::error::Repository secrets HADOOP_TARBALL_SHA512_AMD64 and HADOOP_TARBALL_SHA512_ARM64 are required."
            exit 1
          fi
          if [[ ! "${HADOOP_TARBALL_SHA512_AMD64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_AMD64 must be a 128-char SHA512 hex string."
            exit 1
          fi
          if [[ ! "${HADOOP_TARBALL_SHA512_ARM64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_ARM64 must be a 128-char SHA512 hex string."
            exit 1
          fi

      - name: Show effective Hadoop source
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
          HADOOP_ARCHIVE_AMD64: ${{ secrets.HADOOP_ARCHIVE_AMD64 }}
          HADOOP_ARCHIVE_ARM64: ${{ secrets.HADOOP_ARCHIVE_ARM64 }}
        run: |
          echo "HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          echo "HADOOP_TARBALL_SHA512_AMD64(prefix)=${HADOOP_TARBALL_SHA512_AMD64:0:16}..."
          echo "HADOOP_TARBALL_SHA512_ARM64(prefix)=${HADOOP_TARBALL_SHA512_ARM64:0:16}..."
          if [[ -n "${HADOOP_ARCHIVE_AMD64}" ]]; then
            echo "HADOOP_ARCHIVE_AMD64=${HADOOP_ARCHIVE_AMD64}"
          fi
          if [[ -n "${HADOOP_ARCHIVE_ARM64}" ]]; then
            echo "HADOOP_ARCHIVE_ARM64=${HADOOP_ARCHIVE_ARM64}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build local image for vulnerability scan
        id: build_local
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: local/hadoop-cluster:scan
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
            HADOOP_TARBALL_SHA512=
            HADOOP_TARBALL_SHA512_AMD64=${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
            HADOOP_TARBALL_SHA512_ARM64=${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
            HADOOP_ARCHIVE_AMD64=${{ secrets.HADOOP_ARCHIVE_AMD64 }}
            HADOOP_ARCHIVE_ARM64=${{ secrets.HADOOP_ARCHIVE_ARM64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain build failure with actionable hints
        if: steps.build_local.outcome == 'failure'
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
          HADOOP_ARCHIVE_AMD64: ${{ secrets.HADOOP_ARCHIVE_AMD64 }}
          HADOOP_ARCHIVE_ARM64: ${{ secrets.HADOOP_ARCHIVE_ARM64 }}
        run: |
          echo "::error::Docker builder stage failed while downloading/verifying Hadoop tarball."
          echo "::error::Check repository secrets: HADOOP_TARBALL_SHA512_AMD64 and HADOOP_TARBALL_SHA512_ARM64 (required), optional HADOOP_ARCHIVE_AMD64/HADOOP_ARCHIVE_ARM64, and optional HADOOP_BASE_URL variable."
          echo "::notice::Recommended HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          echo "::notice::Current HADOOP_TARBALL_SHA512_AMD64(prefix)=${HADOOP_TARBALL_SHA512_AMD64:0:16}..."
          echo "::notice::Current HADOOP_TARBALL_SHA512_ARM64(prefix)=${HADOOP_TARBALL_SHA512_ARM64:0:16}..."
          if [[ -n "${HADOOP_ARCHIVE_AMD64}" ]]; then
            echo "::notice::Current HADOOP_ARCHIVE_AMD64=${HADOOP_ARCHIVE_AMD64}"
          fi
          if [[ -n "${HADOOP_ARCHIVE_ARM64}" ]]; then
            echo "::notice::Current HADOOP_ARCHIVE_ARM64=${HADOOP_ARCHIVE_ARM64}"
          fi
          {
            echo "## Build Failure Hint"
            echo "- Local image build failed in Hadoop download/verification stage."
            echo "- Required variables: HADOOP_TARBALL_SHA512_AMD64 and HADOOP_TARBALL_SHA512_ARM64 (both 128-char SHA512 hex)."
            echo "- Optional variables: HADOOP_ARCHIVE_AMD64 and HADOOP_ARCHIVE_ARM64 for architecture-specific tarball names."
            echo "- Optional variable: HADOOP_BASE_URL (default: https://dlcdn.apache.org/apache/hadoop/common)."
            echo "- This workflow will still upload SARIF placeholder to preserve diagnostics artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Scan image with Trivy
        if: steps.build_local.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/hadoop-cluster:scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: 1
          format: table

      - name: Scan image with Trivy (SARIF)
        if: steps.build_local.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/hadoop-cluster:scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif

      - name: Create SARIF placeholder when scan is skipped
        if: steps.build_local.outcome != 'success'
        run: |
          cat > trivy-results.sarif <<'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "trivy",
                    "informationUri": "https://github.com/aquasecurity/trivy",
                    "rules": []
                  }
                },
                "results": [
                  {
                    "ruleId": "scan-skipped",
                    "level": "warning",
                    "message": {
                      "text": "Trivy SARIF scan skipped because local/hadoop-cluster:scan was not built or trivy is unavailable. Check previous build/install steps for root cause."
                    }
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-results-sarif
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
            HADOOP_TARBALL_SHA512=
            HADOOP_TARBALL_SHA512_AMD64=${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
            HADOOP_TARBALL_SHA512_ARM64=${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
            HADOOP_ARCHIVE_AMD64=${{ secrets.HADOOP_ARCHIVE_AMD64 }}
            HADOOP_ARCHIVE_ARM64=${{ secrets.HADOOP_ARCHIVE_ARM64 }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@2e2f661cd4be3a4b891a882064e49d0fed4b7b88 # v3.9.0

      - name: Sign published image digest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.prep.outputs.image }}@${{ steps.build_push.outputs.digest }}"
