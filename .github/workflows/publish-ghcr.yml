name: Publish Container to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Validate tarball checksum variable
        env:
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
        run: |
          if [[ -z "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "::error::Repository variable HADOOP_TARBALL_SHA512 is required."
            exit 1
          fi
          if [[ ! "${HADOOP_TARBALL_SHA512}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512 must be a 128-char SHA512 hex string."
            exit 1
          fi

      - name: Show effective Hadoop source
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
        run: |
          echo "HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          echo "HADOOP_TARBALL_SHA512(prefix)=${HADOOP_TARBALL_SHA512:0:16}..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build local image for vulnerability scan
        id: build_local
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: local/hadoop-cluster:scan
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain build failure with actionable hints
        if: steps.build_local.outcome == 'failure'
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
        run: |
          echo "::error::Docker builder stage failed while downloading/verifying Hadoop tarball."
          echo "::error::Check repository variables: HADOOP_TARBALL_SHA512 (must match hadoop-${{ vars.HADOOP_VERSION != '' && vars.HADOOP_VERSION || '3.4.1' }}.tar.gz) and optional HADOOP_BASE_URL."
          echo "::notice::Recommended HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          echo "::notice::Current HADOOP_TARBALL_SHA512(prefix)=${HADOOP_TARBALL_SHA512:0:16}..."
          {
            echo "## Build Failure Hint"
            echo "- Local image build failed in Hadoop download/verification stage."
            echo "- Required variable: HADOOP_TARBALL_SHA512 (128-char SHA512 hex)."
            echo "- Optional variable: HADOOP_BASE_URL (default: https://dlcdn.apache.org/apache/hadoop/common)."
            echo "- This workflow will still upload SARIF placeholder to preserve diagnostics artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Install Trivy CLI
        if: steps.build_local.outcome == 'success'
        id: install_trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan image with Trivy
        if: steps.build_local.outcome == 'success' && steps.install_trivy.outcome == 'success'
        run: |
          trivy image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            local/hadoop-cluster:scan

      - name: Scan image with Trivy (SARIF)
        if: always()
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1 || ! docker image inspect local/hadoop-cluster:scan >/dev/null 2>&1; then
            cat > trivy-results.sarif <<'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "trivy",
                    "informationUri": "https://github.com/aquasecurity/trivy",
                    "rules": []
                  }
                },
                "results": [
                  {
                    "ruleId": "scan-skipped",
                    "level": "warning",
                    "message": {
                      "text": "Trivy SARIF scan skipped because local/hadoop-cluster:scan was not built or trivy is unavailable. Check previous build/install steps for root cause."
                    }
                  }
                ]
              }
            ]
          }
          EOF
            exit 0
          fi
          trivy image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-results.sarif \
            local/hadoop-cluster:scan

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-results-sarif
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://dlcdn.apache.org/apache/hadoop/common' }}
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@2e2f661cd4be3a4b891a882064e49d0fed4b7b88 # v3.9.0

      - name: Sign published image digest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.prep.outputs.image }}@${{ steps.build_push.outputs.digest }}"
