name: Publish Container to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/hadoop-cluster-3.4.1" >> "$GITHUB_OUTPUT"

      - name: Validate checksum inputs
        env:
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
        run: |
          if [[ -z "${HADOOP_TARBALL_SHA512}" && -z "${HADOOP_TARBALL_SHA512_AMD64}" && -z "${HADOOP_TARBALL_SHA512_ARM64}" ]]; then
            echo "::error::Provide checksum via HADOOP_TARBALL_SHA512 variable, or provide both HADOOP_TARBALL_SHA512_AMD64 and HADOOP_TARBALL_SHA512_ARM64 secrets."
            exit 1
          fi
          if [[ -n "${HADOOP_TARBALL_SHA512}" && ! "${HADOOP_TARBALL_SHA512}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512 must be a 128-char SHA512 hex string."
            exit 1
          fi
          if [[ -n "${HADOOP_TARBALL_SHA512_AMD64}" && ! "${HADOOP_TARBALL_SHA512_AMD64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_AMD64 must be a 128-char SHA512 hex string."
            exit 1
          fi
          if [[ -n "${HADOOP_TARBALL_SHA512_ARM64}" && ! "${HADOOP_TARBALL_SHA512_ARM64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_ARM64 must be a 128-char SHA512 hex string."
            exit 1
          fi
          if [[ ! "${HADOOP_TARBALL_SHA512_AMD64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            if [[ -z "${HADOOP_TARBALL_SHA512}" && -z "${HADOOP_TARBALL_SHA512_ARM64}" ]]; then
              echo "::error::HADOOP_TARBALL_SHA512_AMD64 is required when no generic checksum is provided."
              exit 1
            fi
          fi
          if [[ ! "${HADOOP_TARBALL_SHA512_ARM64}" =~ ^[a-fA-F0-9]{128}$ ]]; then
            if [[ -z "${HADOOP_TARBALL_SHA512}" && -z "${HADOOP_TARBALL_SHA512_AMD64}" ]]; then
              echo "::error::HADOOP_TARBALL_SHA512_ARM64 is required when no generic checksum is provided."
              exit 1
            fi
          fi
          if [[ -n "${HADOOP_TARBALL_SHA512_AMD64}" && -z "${HADOOP_TARBALL_SHA512_ARM64}" && -z "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_ARM64 is required when using per-arch checksums."
            exit 1
          fi
          if [[ -n "${HADOOP_TARBALL_SHA512_ARM64}" && -z "${HADOOP_TARBALL_SHA512_AMD64}" && -z "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "::error::HADOOP_TARBALL_SHA512_AMD64 is required when using per-arch checksums."
            exit 1
          fi

      - name: Resolve AWS SDK bundle version
        id: resolve_aws_sdk_bundle
        env:
          REPOSITORY_VARS_JSON: ${{ toJSON(vars) }}
        run: |
          AWS_SDK_BUNDLE_VERSION_FROM_VAR="$(printf '%s' "${REPOSITORY_VARS_JSON}" | jq -r '.AWS_SDK_BUNDLE_VERSION // empty')"
          AWS_SDK_BUNDLE_VERSION="${AWS_SDK_BUNDLE_VERSION_FROM_VAR:-2.41.30}"
          if [[ ! "${AWS_SDK_BUNDLE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::AWS_SDK_BUNDLE_VERSION must be a semantic version like 2.41.30"
            exit 1
          fi
          echo "aws_sdk_bundle_version=${AWS_SDK_BUNDLE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show effective Hadoop source
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://downloads.apache.org/hadoop/common' }}
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
          HADOOP_ARCHIVE_AMD64: ${{ secrets.HADOOP_ARCHIVE_AMD64 }}
          HADOOP_ARCHIVE_ARM64: ${{ secrets.HADOOP_ARCHIVE_ARM64 }}
          AWS_SDK_BUNDLE_VERSION: ${{ steps.resolve_aws_sdk_bundle.outputs.aws_sdk_bundle_version }}
        run: |
          echo "HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          if [[ -n "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "HADOOP_TARBALL_SHA512(prefix)=${HADOOP_TARBALL_SHA512:0:16}..."
          fi
          echo "HADOOP_TARBALL_SHA512_AMD64(prefix)=${HADOOP_TARBALL_SHA512_AMD64:0:16}..."
          echo "HADOOP_TARBALL_SHA512_ARM64(prefix)=${HADOOP_TARBALL_SHA512_ARM64:0:16}..."
          echo "AWS_SDK_BUNDLE_VERSION=${AWS_SDK_BUNDLE_VERSION}"
          if [[ -n "${HADOOP_ARCHIVE_AMD64}" ]]; then
            echo "HADOOP_ARCHIVE_AMD64=${HADOOP_ARCHIVE_AMD64}"
          fi
          if [[ -n "${HADOOP_ARCHIVE_ARM64}" ]]; then
            echo "HADOOP_ARCHIVE_ARM64=${HADOOP_ARCHIVE_ARM64}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build local image for vulnerability scan
        id: build_local
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: local/hadoop-cluster:scan
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://downloads.apache.org/hadoop/common' }}
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
            HADOOP_TARBALL_SHA512_AMD64=${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
            HADOOP_TARBALL_SHA512_ARM64=${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
            HADOOP_ARCHIVE_AMD64=${{ secrets.HADOOP_ARCHIVE_AMD64 }}
            HADOOP_ARCHIVE_ARM64=${{ secrets.HADOOP_ARCHIVE_ARM64 }}
            AWS_SDK_BUNDLE_VERSION=${{ steps.resolve_aws_sdk_bundle.outputs.aws_sdk_bundle_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain build failure with actionable hints
        if: steps.build_local.outcome == 'failure'
        env:
          HADOOP_BASE_URL: ${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://downloads.apache.org/hadoop/common' }}
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
          HADOOP_TARBALL_SHA512_AMD64: ${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
          HADOOP_TARBALL_SHA512_ARM64: ${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
          HADOOP_ARCHIVE_AMD64: ${{ secrets.HADOOP_ARCHIVE_AMD64 }}
          HADOOP_ARCHIVE_ARM64: ${{ secrets.HADOOP_ARCHIVE_ARM64 }}
          AWS_SDK_BUNDLE_VERSION: ${{ steps.resolve_aws_sdk_bundle.outputs.aws_sdk_bundle_version }}
        run: |
          echo "::error::Docker builder stage failed while downloading/verifying Hadoop tarball."
          echo "::error::Check checksum inputs: HADOOP_TARBALL_SHA512 variable or per-arch secrets HADOOP_TARBALL_SHA512_AMD64/HADOOP_TARBALL_SHA512_ARM64."
          echo "::notice::Recommended HADOOP_BASE_URL=${HADOOP_BASE_URL}"
          if [[ -n "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "::notice::Current HADOOP_TARBALL_SHA512(prefix)=${HADOOP_TARBALL_SHA512:0:16}..."
          fi
          echo "::notice::Current HADOOP_TARBALL_SHA512_AMD64(prefix)=${HADOOP_TARBALL_SHA512_AMD64:0:16}..."
          echo "::notice::Current HADOOP_TARBALL_SHA512_ARM64(prefix)=${HADOOP_TARBALL_SHA512_ARM64:0:16}..."
          echo "::notice::Current AWS_SDK_BUNDLE_VERSION=${AWS_SDK_BUNDLE_VERSION}"
          if [[ -n "${HADOOP_ARCHIVE_AMD64}" ]]; then
            echo "::notice::Current HADOOP_ARCHIVE_AMD64=${HADOOP_ARCHIVE_AMD64}"
          fi
          if [[ -n "${HADOOP_ARCHIVE_ARM64}" ]]; then
            echo "::notice::Current HADOOP_ARCHIVE_ARM64=${HADOOP_ARCHIVE_ARM64}"
          fi
          {
            echo "## Build Failure Hint"
            echo "- Local image build failed in Hadoop download/verification stage."
            echo "- Required checksum input: HADOOP_TARBALL_SHA512 variable or both HADOOP_TARBALL_SHA512_AMD64/HADOOP_TARBALL_SHA512_ARM64 secrets (128-char SHA512 hex)."
            echo "- Optional variables: HADOOP_ARCHIVE_AMD64 and HADOOP_ARCHIVE_ARM64 for architecture-specific tarball names."
            echo "- Optional variable: HADOOP_BASE_URL (default: https://downloads.apache.org/hadoop/common)."
            echo "- Optional variable: AWS_SDK_BUNDLE_VERSION (default: 2.41.30)."
            echo "- This workflow will still upload SARIF placeholder to preserve diagnostics artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Scan image with Trivy
        if: steps.build_local.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/hadoop-cluster:scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: 1
          format: table

      - name: Scan image with Trivy (SARIF)
        if: steps.build_local.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/hadoop-cluster:scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif

      - name: Create SARIF placeholder when scan is skipped
        if: always() && steps.build_local.outcome != 'success'
        run: |
          cat > trivy-results.sarif <<'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "trivy",
                    "informationUri": "https://github.com/aquasecurity/trivy",
                    "rules": []
                  }
                },
                "results": [
                  {
                    "ruleId": "scan-skipped",
                    "level": "warning",
                    "message": {
                      "text": "Trivy SARIF scan skipped because local/hadoop-cluster:scan was not built or trivy is unavailable. Check previous build/install steps for root cause."
                    }
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results-sarif
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HADOOP_BASE_URL=${{ vars.HADOOP_BASE_URL != '' && vars.HADOOP_BASE_URL || 'https://downloads.apache.org/hadoop/common' }}
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
            HADOOP_TARBALL_SHA512_AMD64=${{ secrets.HADOOP_TARBALL_SHA512_AMD64 }}
            HADOOP_TARBALL_SHA512_ARM64=${{ secrets.HADOOP_TARBALL_SHA512_ARM64 }}
            HADOOP_ARCHIVE_AMD64=${{ secrets.HADOOP_ARCHIVE_AMD64 }}
            HADOOP_ARCHIVE_ARM64=${{ secrets.HADOOP_ARCHIVE_ARM64 }}
            AWS_SDK_BUNDLE_VERSION=${{ steps.resolve_aws_sdk_bundle.outputs.aws_sdk_bundle_version }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      - name: Sign published image digest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.prep.outputs.image }}@${{ steps.build_push.outputs.digest }}"
