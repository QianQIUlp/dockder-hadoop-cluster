name: Publish Container to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Warn if tarball checksum is missing
        env:
          HADOOP_TARBALL_SHA512: ${{ vars.HADOOP_TARBALL_SHA512 }}
        run: |
          if [[ -z "${HADOOP_TARBALL_SHA512}" ]]; then
            echo "::warning::Repository variable HADOOP_TARBALL_SHA512 is empty; build will skip Hadoop tarball integrity verification."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build local image for vulnerability scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: local/hadoop-cluster:scan
          build-args: |
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: local/hadoop-cluster:scan
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HADOOP_TARBALL_SHA512=${{ vars.HADOOP_TARBALL_SHA512 }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.0

      - name: Sign published image digest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.prep.outputs.image }}@${{ steps.build_push.outputs.digest }}"
